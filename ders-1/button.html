<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>
<body>
    <div>
        <button>
            Bana Tıkla
        </button>
    </div>

    <!-- submit = form verilerinin onaylanmasını sağlar -->
    <div>
        <button
        type="submit"
        >
            Submit
        </button>
    </div>

    <!-- button = form içerisinde form verilerini onaylamadan başka fonksiyonlar çalıştırmaya yarar -->
    <div>
        <button
        type="button"
        >
            Button
        </button>
    </div>

    <!-- reset = form içeriğinin resetlenmesini sağlar -->
    <div>
        <button
        type="reset"
        >
            Reset
        </button>
    </div>

</body>
</html>
