<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- img = resim görüntülemeye yarar
    src = resmin kaynağıdır
    width = resmin genişliğidir
    height = resmin yüksekliğidir
    alt = resim hakkındaki kısa bilgidir. Hem engelliler için kullanım kolaylığı sağlar hem resim bozulduğunda bilgi verir
    loading lazy = resmin parça parça gelmesini engeller
    -->
    <img
    src="https://www.hepsiburada.com/hayatburada/wp-content/uploads/2021/10/shutterstock_1024133086.jpg"
    width="250"
    height="250"
    alt="Ressam resmi"
    loading="lazy"
    />
</body>
</html>
