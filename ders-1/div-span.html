<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div-Span</title>
</head>
<body>
    

    <!-- block ve inline düzeydeki elementleri belirler
    block tüm genişliği kaplar
    inline sadece kendi alanı kadar genişlik kaplar -->
    
    <!-- div block düzeyindedir -->
    <div
    style="background-color: red;"
    >
        Bu bir divdir
    </div>

    <!-- span inline düzeyindedir -->
    <span
    style="background-color: blue;"
    >
        Bu bir spandır
    </span>

    <div
    style="background-color: red;"
    >
        <label>
            Deneme 1
        </label>
    </div>
    <div
    style="background-color: red;"
    >
        <label>
            Deneme 2
        </label>
    </div>
    <span
    style="background-color: blue;"
    >
        <label>
            Deneme 1
        </label>
    </span>
    <span
    style="background-color: blue;"
    >
        <label>
            Deneme 2
        </label>
    </span>
</body>
</html>
